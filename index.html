<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="VAULT"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icon.svg"/>
<title>VAULT</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--surface3:#222;
  --border:#2a2a2a;--border2:#333;--text:#f0f0f0;--muted:#888;--muted2:#555;
  --accent-series:#e63946;--accent-anime:#ff9f1c;--accent-movies:#2ec4b6;
  --accent-docs:#9b5de5;--accent-books:#4cc9f0;--accent-comics:#f72585;
  --font-d:'Bebas Neue',sans-serif;--font-b:'DM Sans',sans-serif;
  --r:12px;--rs:8px;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
button{cursor:pointer;font-family:var(--font-b)}
input,select,textarea{font-family:var(--font-b)}

#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
#hdr{padding:env(safe-area-inset-top,16px) 16px 8px;padding-top:max(env(safe-area-inset-top),20px);position:sticky;top:0;z-index:50;background:var(--bg)}
#hdr-inner{display:flex;align-items:center;justify-content:space-between}
#logo{font-family:var(--font-d);font-size:32px;letter-spacing:2px;line-height:1}
#logo span{color:var(--accent-series)}
#stats-bar{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:1px;text-transform:uppercase}

/* TABS */
#tab-scroll{overflow-x:auto;padding:10px 16px 0;display:flex;gap:6px;scrollbar-width:none}
#tab-scroll::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:7px 15px;border-radius:20px;border:1.5px solid var(--border2);background:transparent;color:var(--muted);font-size:13px;font-weight:500;letter-spacing:.4px;transition:all .2s;white-space:nowrap}
.tab-btn.active{color:#000;border-color:transparent;font-weight:600}
.tab-btn[data-tab="series"].active{background:var(--accent-series)}
.tab-btn[data-tab="anime"].active{background:var(--accent-anime)}
.tab-btn[data-tab="movies"].active{background:var(--accent-movies)}
.tab-btn[data-tab="documentaries"].active{background:var(--accent-docs);color:#fff}
.tab-btn[data-tab="books"].active{background:var(--accent-books)}
.tab-btn[data-tab="comics"].active{background:var(--accent-comics)}

/* DASH STRIP */
#dash-strip{padding:10px 16px 0;display:flex;gap:10px;overflow-x:auto;scrollbar-width:none}
#dash-strip::-webkit-scrollbar{display:none}
.dash-item{flex-shrink:0;text-align:center;cursor:pointer}
.dash-img{width:60px;height:82px;border-radius:8px;object-fit:cover;border:2px solid var(--border2)}
.dash-img-ph{width:60px;height:82px;border-radius:8px;background:var(--surface2);border:1.5px dashed var(--border2);display:flex;align-items:center;justify-content:center}
.dash-label{font-size:9px;color:var(--muted);margin-top:3px;letter-spacing:.4px;text-transform:uppercase;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dash-dot{width:5px;height:5px;border-radius:50%;margin:0 auto 3px}

/* CONTENT */
#content{flex:1;padding:6px 16px 120px}
.group-label{font-family:var(--font-d);font-size:11px;letter-spacing:3px;text-transform:uppercase;padding:10px 0 4px;margin-top:2px;opacity:.7}

/* CARD */
.project-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;transition:border-color .2s}

/* milestone glow borders */
.milestone-50 {border:1.5px solid #00f5ff;box-shadow:0 0 8px rgba(0,245,255,.18)}
.milestone-100{border:1.5px solid #ffd700;box-shadow:0 0 8px rgba(255,215,0,.2)}
.milestone-150{border:1.5px solid #ff6b35;box-shadow:0 0 8px rgba(255,107,53,.2)}
.milestone-200{border:1.5px solid #bf5fff;box-shadow:0 0 8px rgba(191,95,255,.2)}
.milestone-250{border:1.5px solid #00ff88;box-shadow:0 0 8px rgba(0,255,136,.18)}
.milestone-300{border:1.5px solid #ff3cac;box-shadow:0 0 8px rgba(255,60,172,.2)}
.milestone-350{border:1.5px solid #f9ca24;box-shadow:0 0 8px rgba(249,202,36,.2)}
.milestone-400{border:1.5px solid #00b4d8;box-shadow:0 0 8px rgba(0,180,216,.2)}
.milestone-gem {border:1.5px solid #fff;box-shadow:0 0 12px rgba(255,255,255,.25)}

.card-top{display:flex;align-items:flex-start;gap:10px}
.card-num{font-family:var(--font-d);font-size:20px;color:var(--muted2);min-width:26px;line-height:1.2;padding-top:2px}
/* milestone number colours */
.num-50 {color:#00f5ff}
.num-100{color:#ffd700}
.num-150{color:#ff6b35}
.num-200{color:#bf5fff}
.num-250{color:#00ff88}
.num-300{color:#ff3cac}
.num-350{color:#f9ca24}
.num-400{color:#00b4d8}
.num-gem{color:#fff}

.card-img{width:50px;height:68px;border-radius:6px;object-fit:cover;flex-shrink:0;cursor:pointer;border:1.5px solid var(--border2)}
.card-img-ph{width:50px;height:68px;border-radius:6px;background:var(--surface3);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1.5px dashed var(--border2)}
.card-body{flex:1;min-width:0}
.card-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.card-meta{font-size:11px;color:var(--muted);margin-bottom:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.card-tags{display:flex;flex-wrap:wrap;gap:3px}
.tag{font-size:10px;padding:2px 7px;border-radius:12px;font-weight:500}

.card-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.rating-badge{font-family:var(--font-d);font-size:20px;letter-spacing:1px;line-height:1}
.rating-sub{font-size:10px;color:var(--muted);letter-spacing:.5px;margin-top:1px}
.card-actions{display:flex;gap:6px}
.icon-btn{background:transparent;border:1px solid var(--border2);color:var(--muted);border-radius:6px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;flex-shrink:0}
.icon-btn:hover,.icon-btn:active{border-color:var(--muted);color:var(--text)}
.icon-btn.del{border-color:#2a1515}
.icon-btn.del:hover,.icon-btn.del:active{border-color:#e63946;color:#e63946;background:rgba(230,57,70,.1)}

/* milestone badge on card */
.milestone-badge{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-left:4px}
.mb-50 {background:rgba(0,245,255,.15);color:#00f5ff}
.mb-100{background:rgba(255,215,0,.15);color:#ffd700}
.mb-150{background:rgba(255,107,53,.15);color:#ff6b35}
.mb-200{background:rgba(191,95,255,.15);color:#bf5fff}
.mb-250{background:rgba(0,255,136,.15);color:#00ff88}
.mb-300{background:rgba(255,60,172,.15);color:#ff3cac}
.mb-350{background:rgba(249,202,36,.15);color:#f9ca24}
.mb-400{background:rgba(0,180,216,.15);color:#00b4d8}
.mb-gem{background:rgba(255,255,255,.1);color:#fff}

/* TAB ACCENT TAGS */
.acc-series{background:rgba(230,57,70,.15);color:#ff6b75;border:none}
.acc-anime{background:rgba(255,159,28,.15);color:#ffb74d;border:none}
.acc-movies{background:rgba(46,196,182,.15);color:#4dd0c4;border:none}
.acc-docs{background:rgba(155,93,229,.2);color:#c77dff;border:none}
.acc-books{background:rgba(76,201,240,.15);color:#4cc9f0;border:none}
.acc-comics{background:rgba(247,37,133,.15);color:#ff5da2;border:none}

/* ADD BTN */
#add-btn{position:fixed;bottom:calc(52px + env(safe-area-inset-bottom,0px));right:18px;width:54px;height:54px;border-radius:50%;border:none;color:#000;font-size:26px;display:flex;align-items:center;justify-content:center;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,.6);transition:transform .15s}
#add-btn:active{transform:scale(.92)}
.add-btn-series{background:var(--accent-series)}
.add-btn-anime{background:var(--accent-anime)}
.add-btn-movies{background:var(--accent-movies)}
.add-btn-documentaries{background:var(--accent-docs);color:#fff}
.add-btn-books{background:var(--accent-books)}
.add-btn-comics{background:var(--accent-comics)}

/* BOTTOM BAR */
#bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border);padding:6px 16px;padding-bottom:max(8px,env(safe-area-inset-bottom));display:flex;align-items:center;gap:8px;z-index:99}
.grp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
#grp-label{font-size:11px;color:var(--muted);letter-spacing:.5px}

/* MODAL */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;align-items:flex-end;justify-content:center}
#overlay.open{display:flex}
#modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 20px;padding-bottom:max(40px,env(safe-area-inset-bottom,40px));max-height:92vh;overflow-y:auto;position:relative}
#modal h2{font-family:var(--font-d);font-size:26px;letter-spacing:1px;margin-bottom:16px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:var(--rs);padding:10px 12px;font-size:14px;outline:none;transition:border-color .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--muted)}
select option{background:var(--surface2)}
.genre-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.genre-chip{padding:5px 11px;border-radius:16px;border:1.5px solid var(--border2);font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s;user-select:none;background:transparent}
.genre-chip.sel{border-color:transparent;color:#000;font-weight:600}

/* RATING INPUT */
.rating-wrap{display:flex;align-items:center;gap:10px;margin-top:4px}
#f-rating{width:100px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:var(--rs);padding:10px 12px;font-size:20px;font-family:var(--font-d);letter-spacing:1px;outline:none;text-align:center}
#f-rating:focus{border-color:var(--muted)}
.rating-hint{font-size:12px;color:var(--muted2)}

.modal-actions{display:flex;gap:10px;margin-top:20px}
.btn-p{flex:1;padding:13px;border-radius:var(--rs);border:none;font-size:15px;font-weight:600}
.btn-s{padding:13px 20px;border-radius:var(--rs);border:1.5px solid var(--border2);background:transparent;color:var(--muted);font-size:15px}
.modal-x{position:absolute;top:16px;right:16px;background:var(--surface3);border:none;color:var(--muted);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}

/* IMG UPLOAD */
#img-wrap{width:78px;height:108px;border-radius:8px;border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0}
#img-prev{width:100%;height:100%;object-fit:cover;display:none}
#img-ph{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);font-size:11px;text-align:center;padding:4px}
#img-file{display:none}

.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty i{font-size:48px;margin-bottom:12px;display:block;opacity:.3}
.empty p{font-size:14px}

/* INSTALL BANNER */
#install-banner{display:none;margin:10px 16px 0;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:12px 14px;align-items:center;gap:10px}
#install-banner.show{display:flex}
#install-banner p{font-size:12px;color:var(--muted);flex:1;line-height:1.5}
#install-btn{background:var(--accent-series);color:#fff;border:none;border-radius:var(--rs);padding:8px 14px;font-size:12px;font-weight:600;flex-shrink:0}
#install-x{background:transparent;border:none;color:var(--muted2);font-size:18px;padding:0 4px;flex-shrink:0}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div id="hdr-inner">
      <div>
        <div id="logo">VAULT<span>.</span></div>
        <div id="stats-bar">Loading…</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:10px;color:var(--muted);letter-spacing:1.5px">ENTERTAINMENT</div>
        <div style="font-size:10px;color:var(--muted);letter-spacing:1.5px">TRACKER</div>
      </div>
    </div>
  </div>

  <div id="install-banner">
    <p>Install VAULT on your home screen for offline access & persistent data.</p>
    <button id="install-btn">Install</button>
    <button id="install-x">×</button>
  </div>

  <div id="dash-strip"></div>

  <div id="tab-scroll">
    <button class="tab-btn active" data-tab="series">Series</button>
    <button class="tab-btn" data-tab="anime">Anime</button>
    <button class="tab-btn" data-tab="movies">Movies</button>
    <button class="tab-btn" data-tab="documentaries">Documentaries</button>
    <button class="tab-btn" data-tab="books">Books</button>
    <button class="tab-btn" data-tab="comics">Comics</button>
  </div>

  <div id="content"></div>
</div>

<button id="add-btn" onclick="openModal()"><i class="ti ti-plus"></i></button>

<div id="bottom-bar">
  <div class="grp-dot" id="grp-dot" style="background:var(--accent-series)"></div>
  <span id="grp-label">Screen — Series, Anime, Movies</span>
</div>

<!-- MODAL -->
<div id="overlay" onclick="closeModal(event)">
  <div id="modal">
    <button class="modal-x" onclick="closeModal(null,true)"><i class="ti ti-x"></i></button>
    <h2 id="modal-title">Add Entry</h2>

    <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:14px">
      <div>
        <div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px">Cover</div>
        <div id="img-wrap" onclick="document.getElementById('img-file').click()">
          <img id="img-prev" alt="cover"/>
          <div id="img-ph"><i class="ti ti-photo" style="font-size:22px"></i><span>Add photo</span></div>
        </div>
        <input type="file" id="img-file" accept="image/*" onchange="handleImg(event)"/>
      </div>
      <div style="flex:1;min-width:0">
        <div class="fg">
          <label>Title</label>
          <input type="text" id="f-title" placeholder="Enter title…"/>
        </div>
        <div class="fg">
          <label>Status</label>
          <select id="f-status">
            <option value="completed">Completed</option>
            <option value="dropped">Dropped</option>
            <option value="planned">Plan to Watch</option>
          </select>
        </div>
      </div>
    </div>

    <div class="fg">
      <label>Your Rating</label>
      <div class="rating-wrap">
        <input type="number" id="f-rating" min="0" max="10" step="0.5" placeholder="—"/>
        <span class="rating-hint">out of 10 &nbsp;·&nbsp; e.g. 8.5</span>
      </div>
    </div>

    <div class="fg">
      <label>Genres</label>
      <div class="genre-grid" id="genre-grid"></div>
    </div>

    <div class="fg">
      <label>Date Completed</label>
      <input type="date" id="f-date"/>
    </div>

    <div class="fg">
      <label>Notes (optional)</label>
      <textarea id="f-notes" rows="2" style="resize:none" placeholder="Your thoughts…"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-s" onclick="closeModal(null,true)">Cancel</button>
      <button class="btn-p" id="save-btn" onclick="saveEntry()">Save Entry</button>
    </div>
  </div>
</div>

<script>
const TABS=['series','anime','movies','documentaries','books','comics'];
const GROUPS={series:'Screen — Series, Anime, Movies',anime:'Screen — Series, Anime, Movies',movies:'Screen — Series, Anime, Movies',documentaries:'Docs & Knowledge',books:'Reading — Books & Comics',comics:'Reading — Books & Comics'};
const COLORS={series:'#e63946',anime:'#ff9f1c',movies:'#2ec4b6',documentaries:'#9b5de5',books:'#4cc9f0',comics:'#f72585'};
const GENRES={
  series:['Action','Adventure','Comedy','Crime','Drama','Fantasy','Horror','Mystery','Romance','Sci-Fi','Thriller','Supernatural','Historical','Political','Teen','Spy','Western','Dark Comedy','Dystopian','Slice of Life'],
  anime:['Action','Adventure','Comedy','Drama','Fantasy','Horror','Mecha','Mystery','Romance','Sci-Fi','Shonen','Seinen','Shojo','Slice of Life','Sports','Supernatural','Isekai','Psychological','Historical','Ecchi'],
  movies:['Action','Adventure','Animation','Biography','Comedy','Crime','Documentary','Drama','Fantasy','Historical','Horror','Musical','Mystery','Romance','Sci-Fi','Thriller','Western','War','Superhero','Noir'],
  documentaries:['Nature','Science','History','Crime','Politics','Biography','Culture','Technology','Sports','Music','Art','Society','Environment','War','Space','Food','Travel','Philosophy','Religion','Economics'],
  books:['Fiction','Non-Fiction','Fantasy','Sci-Fi','Mystery','Thriller','Romance','Horror','Biography','Self-Help','History','Philosophy','Classic','Young Adult','Poetry','Adventure','Drama','Crime','Science','Business'],
  comics:['Superhero','Action','Adventure','Comedy','Drama','Horror','Sci-Fi','Fantasy','Mystery','Slice of Life','Manga','Graphic Novel','Crime','Historical','Political','Romance','Sports','Biographical','Anthology','Children']
};
const STATUS_LABELS={completed:'Completed',dropped:'Dropped',planned:'Planned'};
const STATUS_COLORS={completed:'#06d6a0',dropped:'#ef476f',planned:'#4cc9f0'};

// Milestone config: every 50th entry gets a special look
const MILESTONES={
  50: {card:'milestone-50',num:'num-50',badge:'mb-50',label:'#50'},
  100:{card:'milestone-100',num:'num-100',badge:'mb-100',label:'#100'},
  150:{card:'milestone-150',num:'num-150',badge:'mb-150',label:'#150'},
  200:{card:'milestone-200',num:'num-200',badge:'mb-200',label:'#200'},
  250:{card:'milestone-250',num:'num-250',badge:'mb-250',label:'#250'},
  300:{card:'milestone-300',num:'num-300',badge:'mb-300',label:'#300'},
  350:{card:'milestone-350',num:'num-350',badge:'mb-350',label:'#350'},
  400:{card:'milestone-400',num:'num-400',badge:'mb-400',label:'#400'},
};
function getMilestone(n){
  if(n>400&&n%50===0)return{card:'milestone-gem',num:'num-gem',badge:'mb-gem',label:`#${n}`};
  return MILESTONES[n]||null;
}

let activeTab='series',db={},editId=null,imgData=null;
const SK='vault_v3';

function save(){try{localStorage.setItem(SK,JSON.stringify(db))}catch(e){}}
function load(){
  try{const r=localStorage.getItem(SK);if(r){db=JSON.parse(r);}else initDefaults();}
  catch(e){initDefaults();}
  TABS.forEach(t=>{if(!db[t])db[t]=[];});
}
function initDefaults(){
  db={};TABS.forEach(t=>db[t]=[]);
  db.series.push({id:uid(),title:'Stranger Things',genres:['Sci-Fi','Horror','Supernatural'],status:'completed',rating:9,date:'',notes:'',img:'',created:Date.now()-2000});
  db.anime.push({id:uid(),title:'Dragon Ball Z',genres:['Action','Shonen','Adventure'],status:'completed',rating:9.5,date:'',notes:'',img:'',created:Date.now()-1000});
  save();
}
function uid(){return Math.random().toString(36).slice(2,9)+Date.now().toString(36)}

function ratingColor(r){
  if(!r&&r!==0)return'var(--muted)';
  if(r>=8.5)return'#06d6a0';
  if(r>=7)return'#ffd166';
  if(r>=5)return'#ff9f1c';
  return'#ef476f';
}

function render(){
  const entries=db[activeTab]||[];
  const sorted=[...entries].sort((a,b)=>{
    const ga=(a.genres&&a.genres[0])||'';
    const gb=(b.genres&&b.genres[0])||'';
    if(ga!==gb)return ga.localeCompare(gb);
    return a.created-b.created;
  });
  const groups={};
  sorted.forEach(e=>{
    const g=(e.genres&&e.genres[0])||'Uncategorised';
    if(!groups[g])groups[g]=[];
    groups[g].push(e);
  });

  const acc='acc-'+activeTab;
  const color=COLORS[activeTab];
  let html='',idx=1;

  if(!sorted.length){
    html=`<div class="empty"><i class="ti ti-stack-2"></i><p>No entries yet. Hit + to add your first.</p></div>`;
  } else {
    Object.entries(groups).forEach(([genre,items])=>{
      html+=`<div class="group-label" style="color:${color}">${genre}</div>`;
      items.forEach(item=>{
        const ms=getMilestone(idx);
        const cardCls=ms?` ${ms.card}`:'';
        const numCls=ms?` ${ms.num}`:'';
        const msBadge=ms?`<span class="milestone-badge ${ms.badge}">${ms.label}</span>`:'';

        const tags=(item.genres||[]).map(g=>`<span class="tag ${acc}">${g}</span>`).join('');
        const dateStr=item.date?`· ${formatDate(item.date)}`:'';
        const imgEl=item.img
          ?`<img class="card-img" src="${item.img}" alt="" onclick="quickImg('${item.id}')"/>`
          :`<div class="card-img-ph" onclick="quickImg('${item.id}')"><i class="ti ti-photo-plus" style="font-size:18px;color:var(--muted2)"></i></div>`;

        const r=item.rating;
        const rDisplay=r||r===0?`<span class="rating-badge" style="color:${ratingColor(r)}">${r}</span><div class="rating-sub">/ 10</div>`:`<span style="color:var(--muted2);font-size:12px">No rating</span>`;

        html+=`<div class="project-card${cardCls}">
          <div class="card-top">
            <div class="card-num${numCls}">${String(idx).padStart(2,'0')}</div>
            ${imgEl}
            <div class="card-body">
              <div class="card-title">${esc(item.title)}${msBadge}</div>
              <div class="card-meta">
                <span style="color:${STATUS_COLORS[item.status]||'#888'};font-weight:600">${STATUS_LABELS[item.status]||item.status}</span>
                <span style="color:var(--muted2)">${dateStr}</span>
              </div>
              <div class="card-tags">${tags}</div>
            </div>
          </div>
          <div class="card-bottom">
            <div>${rDisplay}</div>
            <div class="card-actions">
              <button class="icon-btn" onclick="openModal('${item.id}')" aria-label="Edit"><i class="ti ti-pencil"></i></button>
              <button class="icon-btn del" onclick="delEntry('${item.id}')" aria-label="Delete"><i class="ti ti-trash"></i></button>
            </div>
          </div>
        </div>`;
        idx++;
      });
    });
  }

  document.getElementById('content').innerHTML=html;
  updateStats();renderDash();updateBar();updateFab();
}

function esc(s){return s.replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]))}
function formatDate(d){if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}

function renderDash(){
  let html='';
  TABS.forEach(tab=>{
    const entries=db[tab]||[];if(!entries.length)return;
    const fav=entries.find(e=>e.img)||entries[0];
    const c=COLORS[tab];
    html+=`<div class="dash-item" onclick="switchTab('${tab}')">
      <div class="dash-dot" style="background:${c}"></div>
      ${fav.img?`<img class="dash-img" src="${fav.img}" alt="${esc(fav.title)}" style="border-color:${c}"/>`:`<div class="dash-img-ph"><i class="ti ti-${tabIcon(tab)}" style="font-size:20px;color:${c}"></i></div>`}
      <div class="dash-label">${esc(fav.title)}</div>
    </div>`;
  });
  document.getElementById('dash-strip').innerHTML=html;
}

function tabIcon(t){return{series:'device-tv',anime:'star',movies:'movie',documentaries:'camera',books:'book',comics:'pencil-minus'}[t]||'star'}

function updateStats(){
  const total=TABS.reduce((s,t)=>(db[t]||[]).length+s,0);
  const comp=TABS.reduce((s,t)=>s+(db[t]||[]).filter(e=>e.status==='completed').length,0);
  document.getElementById('stats-bar').textContent=`${total} projects · ${comp} completed`;
}
function updateBar(){
  document.getElementById('grp-dot').style.background=COLORS[activeTab];
  document.getElementById('grp-label').textContent=GROUPS[activeTab];
}
function updateFab(){document.getElementById('add-btn').className=`add-btn-${activeTab}`}

function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  render();
}
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));

let qImgId=null;
function openModal(id){
  editId=id||null;imgData=null;
  const e=id?(db[activeTab]||[]).find(x=>x.id===id):null;
  document.getElementById('modal-title').textContent=id?'Edit Entry':`Add ${cap(activeTab)}`;
  document.getElementById('f-title').value=e?.title||'';
  document.getElementById('f-status').value=e?.status||'completed';
  document.getElementById('f-date').value=e?.date||'';
  document.getElementById('f-notes').value=e?.notes||'';
  document.getElementById('f-rating').value=(e?.rating||e?.rating===0)?e.rating:'';

  const prev=document.getElementById('img-prev'),ph=document.getElementById('img-ph');
  if(e?.img){prev.src=e.img;prev.style.display='block';ph.style.display='none';}
  else{prev.style.display='none';ph.style.display='flex';}
  if(e?.img)imgData=e.img;

  const ac=COLORS[activeTab];
  const genres=GENRES[activeTab]||[],selected=e?.genres||[];
  document.getElementById('genre-grid').innerHTML=genres.map(g=>{
    const s=selected.includes(g);
    return`<div class="genre-chip${s?' sel':''}" style="${s?`background:${ac};color:#000;border-color:${ac}`:''}" onclick="togGenre(this,'${ac}')">${g}</div>`;
  }).join('');

  const sb=document.getElementById('save-btn');
  sb.style.background=ac;sb.style.color=activeTab==='documentaries'?'#fff':'#000';
  document.getElementById('overlay').classList.add('open');
}

function togGenre(el,color){
  el.classList.toggle('sel');
  if(el.classList.contains('sel')){el.style.background=color;el.style.borderColor=color;el.style.color='#000';}
  else{el.style.background='';el.style.borderColor='';el.style.color='';}
}
function closeModal(e,force){
  if(force||!e||e.target===document.getElementById('overlay')){
    document.getElementById('overlay').classList.remove('open');
    editId=null;imgData=null;
  }
}
function handleImg(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    imgData=ev.target.result;
    const p=document.getElementById('img-prev');
    p.src=imgData;p.style.display='block';
    document.getElementById('img-ph').style.display='none';
  };
  r.readAsDataURL(file);
}
function saveEntry(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').focus();return;}
  const selGenres=[...document.querySelectorAll('#genre-grid .genre-chip.sel')].map(el=>el.textContent);
  const rawR=document.getElementById('f-rating').value;
  const rating=rawR!==''?Math.min(10,Math.max(0,parseFloat(rawR))):null;

  const entry={id:editId||uid(),title,genres:selGenres,status:document.getElementById('f-status').value,rating,date:document.getElementById('f-date').value,notes:document.getElementById('f-notes').value,img:imgData||'',created:Date.now()};
  if(!db[activeTab])db[activeTab]=[];
  if(editId){
    const i=db[activeTab].findIndex(x=>x.id===editId);
    if(i>-1){entry.created=db[activeTab][i].created;db[activeTab][i]=entry;}
    else db[activeTab].push(entry);
  }else db[activeTab].push(entry);
  save();closeModal(null,true);render();
}
function delEntry(id){
  if(!confirm('Delete this entry?'))return;
  db[activeTab]=(db[activeTab]||[]).filter(x=>x.id!==id);
  save();render();
}
function quickImg(id){
  qImgId=id;
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{
      const entry=(db[activeTab]||[]).find(x=>x.id===qImgId);
      if(entry){entry.img=ev.target.result;save();render();}
    };
    r.readAsDataURL(file);
  };
  inp.click();
}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1)}

/* PWA INSTALL */
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('install-banner').classList.add('show');
});
document.getElementById('install-btn').addEventListener('click',async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  const{outcome}=await deferredPrompt.userChoice;
  deferredPrompt=null;
  document.getElementById('install-banner').classList.remove('show');
});
document.getElementById('install-x').addEventListener('click',()=>{
  document.getElementById('install-banner').classList.remove('show');
});
window.addEventListener('appinstalled',()=>{
  document.getElementById('install-banner').classList.remove('show');
});

/* SERVICE WORKER */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

load();render();
</script>
</body>
</html>
